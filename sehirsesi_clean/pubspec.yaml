name: sehir_ses
description: ŞehirSes — Şehir Keşif ve Mahalle Analitiği Platformu
publish_to: 'none'
version: 1.0.3+12

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.2
  go_router: ^13.2.0
  supabase_flutter: ^2.5.0
  dio: ^5.4.3

  crypto: ^3.0.3
  flutter_secure_storage: ^9.0.0

  flutter_map: ^8.2.2
  latlong2: ^0.9.1

  fl_chart: ^0.67.0
  lottie: ^3.1.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  animations: ^2.0.11
  cached_network_image: ^3.3.1

  image_picker: ^1.1.0
  path_provider: ^2.1.3

  shared_preferences: ^2.2.3

  geolocator: ^11.0.0
  geocoding: ^3.0.0

  flutter_dotenv: ^5.1.0

  intl: ^0.19.0
  uuid: ^4.4.0
  url_launcher: ^6.3.0
  share_plus: ^9.0.0

  cupertino_icons: ^1.0.6
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/geojson/
    - assets/data/districts.json
    - assets/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#0A1F2C"
  adaptive_icon_foreground: "assets/logo.png"