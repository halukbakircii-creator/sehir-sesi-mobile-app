name: sehir_ses
description: ŞehirSes — Şehir Keşif ve Mahalle Analitiği Platformu
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^13.2.0

  # Backend — Supabase
  supabase_flutter: ^2.5.0

  # HTTP & API
  dio: ^5.4.3

  # Güvenlik
  crypto: ^3.0.3
  flutter_secure_storage: ^9.0.0

  # Harita
  flutter_map: ^6.1.0          # OpenStreetMap tabanlı (ücretsiz)
  latlong2: ^0.9.1

  # UI & Animasyon
  fl_chart: ^0.67.0            # Grafik/chart
  lottie: ^3.1.0               # Lottie animasyonları
  shimmer: ^3.0.0              # Yükleme shimmer efekti
  flutter_animate: ^4.5.0      # Genel animasyon
  animations: ^2.0.11          # Material animasyonlar
  cached_network_image: ^3.3.1 # Resim önbellekleme

  # Kamera & Dosya
  image_picker: ^1.1.0         # Fotoğraf ekleme (yorum fotoğrafı)
  path_provider: ^2.1.3

  # Depolama
  shared_preferences: ^2.2.3

  # Konum
  geolocator: ^11.0.0          # Kullanıcı konumu
  geocoding: ^3.0.0            # Koordinat → adres

  
 

  # Güvenli env yönetimi
  flutter_dotenv: ^5.1.0

  # Yardımcılar
  intl: ^0.19.0
  uuid: ^4.4.0
  url_launcher: ^6.3.0         # Harici bağlantılar
  share_plus: ^9.0.0           # Paylaşım

  # İkonlar
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/geojson/
